name: phold_env
channels:
  - conda-forge
  - bioconda
  - defaults

# Kept in sync with the `[project.dependencies]` list in pyproject.toml.
# Lower bounds match. Two intentional differences:
#   * ``pytorch`` here vs ``torch`` in pyproject (conda calls the package
#     ``pytorch``).
#   * ``pholdlib`` is installed via the ``pip:`` subsection at the bottom
#     because it is published to PyPI but not (yet) to bioconda.
dependencies:
  # External tool — not a Python package
  - foldseek ==10.941cd33

  # Python itself
  - python >=3.8,<4

  # Phold runtime dependencies (alphabetical for diff-friendliness)
  - alive-progress >=3.0.1
  - biopython >=1.80
  - click >=8.0.0
  - datasets >=2.15
  - h5py >=3.5
  - loguru >=0.5.3
  - numpy >=1.24            # see comment in pyproject.toml — 1.24 is the
                            # lowest version compatible with Debian-shipped
                            # numpy in the ROCm pytorch Docker base image
  - polars >=1.0            # replaced pandas as the runtime dataframe lib
  - protobuf >=6.0
  - pyarrow >=14.0.0
  - pycirclize >=0.3.1
  - pyrodigal-gv >=0.3.1
  - pytorch >=2.1.2         # pip name: ``torch``
  - pyyaml >=6.0
  - requests >=2.25
  - sentencepiece >=0.1.99
  - tqdm >=4.35.0
  - transformers >=4.34

  # PyPI-only deps installed after the conda solve completes.
  # will put on conda soon
  - pip
  - pip:
      - pholdlib >=0.1.1
